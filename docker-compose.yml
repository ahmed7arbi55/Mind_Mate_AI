version: '3.8'

services:
  emotion-detection:
    build: .
    container_name: emotion-detection-api
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DEVICE=cpu
      - DEBUG=True
      - RELOAD=True
    volumes:
      - .:/app
    command: python run.py
